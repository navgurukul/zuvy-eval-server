name: deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_KEY }}
          username: ubuntu
          key: ${{ secrets.EC2_IP }}
          script: |
            cd /home/ubuntu/zuvy-eval-server
            git pull origin main
            docker stop zuvy-eval-server
            docker rm zuvy-eval-server
            docker compose up -d --build
