services:
  api:
    container_name: zuvy-eval-server
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NODE_VERSION: ${NODE_VERSION:-20.18.0}
    image: ${DOCKER_IMAGE:-zuvy-eval-server}:${DOCKER_TAG:-latest}
    restart: unless-stopped
    network_mode: "host"       # <-- ADD THIS
    env_file:
      - .env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_HOST: 172.31.26.195    # <-- This now works because of network_mode: host
      REDIS_PORT: 6379
    # REMOVE the 'ports' and 'expose' sections completely
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
